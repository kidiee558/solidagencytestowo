<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agencja Marketingowa: Strony Internetowe Premium, SEO & Google Ads</title>
    <meta name="description" content="Ekskluzywne strony i sklepy e-commerce. Reklamy produktowe 3D. Pozycjonowanie stron oraz Google & Meta Ads. Autorskie systemy skalowania firm - Lublin" />
    <link rel="preload" href="/fonts/Humane-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/fonts/geist400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/fonts/inter400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/fonts/inter700.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <script>
      // Function to load external scripts
      const loadExternalScripts = () => {
        if (window.scriptsLoaded) return;
        window.scriptsLoaded = true;

        // Google Tag Manager
        const gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-8CB2Y08WZF';
        document.head.appendChild(gtagScript);

        const gtagInline = document.createElement('script');
        gtagInline.innerHTML = `
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-8CB2Y08WZF');
        `;
        document.head.appendChild(gtagInline);

        // Microsoft Clarity
        const clarityScript = document.createElement('script');
        clarityScript.type = 'text/javascript';
        clarityScript.innerHTML = `
          (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "w2j5bp8bhv");
        `;
        document.head.appendChild(clarityScript);
      };

      // Load 4 seconds after window load or on first interaction
      window.addEventListener('load', () => {
        setTimeout(loadExternalScripts, 4000);
      });

      ['mousedown', 'mousemove', 'touchstart', 'scroll', 'keydown'].forEach(event => {
        window.addEventListener(event, loadExternalScripts, { once: true, passive: true });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
